<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XML Parser Service</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        background: #0d1117;
        color: #c9d1d9;
        font-family: "Inter", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 16px;
      }

      .header {
        text-align: center;
        margin-bottom: 36px;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 700;
        color: #58a6ff;
        letter-spacing: -0.5px;
      }

      .header p {
        margin-top: 8px;
        color: #8b949e;
        font-size: 0.95rem;
      }

      .card {
        width: 100%;
        max-width: 720px;
        background: #161b22;
        border: 1px solid #30363d;
        border-radius: 12px;
        padding: 28px;
      }

      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: #8b949e;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      textarea {
        width: 100%;
        height: 220px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        color: #c9d1d9;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        padding: 14px;
        resize: vertical;
        outline: none;
        transition: border-color 0.2s;
      }

      textarea:focus {
        border-color: #58a6ff;
      }

      button {
        margin-top: 16px;
        width: 100%;
        padding: 12px;
        background: #238636;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #2ea043;
      }
      button:active {
        background: #196c2e;
      }

      .output-section {
        margin-top: 24px;
      }

      #output {
        min-height: 100px;
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 0.82rem;
        white-space: pre-wrap;
        word-break: break-all;
        color: #a5d6a7;
      }

      #output.error {
        color: #f85149;
      }
      #output.idle {
        color: #8b949e;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>🔍 XML Parser Service</h1>
      <p>
        Paste your XML below and hit <strong>Parse</strong> to view the parsed
        output.
      </p>
    </div>

    <div class="card">
      <label for="xmlInput">XML Input</label>
      <textarea
        id="xmlInput"
        placeholder='<?xml version="1.0"?>&#10;<root>&#10;  <item>Hello World</item>&#10;</root>'
      ></textarea>
      <button onclick="parseXML()">Parse XML</button>

      <div class="output-section">
        <label>Output</label>
        <div id="output" class="idle">Output will appear here…</div>
      </div>
    </div>

    <script>
      async function parseXML() {
        const xml = document.getElementById("xmlInput").value.trim();
        const out = document.getElementById("output");

        if (!xml) {
          out.className = "error";
          out.textContent = "Please enter some XML first.";
          return;
        }

        out.className = "idle";
        out.textContent = "Parsing…";

        try {
          const res = await fetch("/api/parse.php", {
            method: "POST",
            headers: { "Content-Type": "application/xml" },
            body: xml,
          });

          const data = await res.json();

          if (data.error) {
            out.className = "error";
            out.textContent = "Error: " + data.error;
          } else {
            out.className = "";
            out.textContent = data.result;
          }
        } catch (e) {
          out.className = "error";
          out.textContent = "Request failed: " + e.message;
        }
      }
    </script>
  </body>
</html>
